<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHYAI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Petrona:wght@400&family=Source+Sans+3:wght@400&display=swap" rel="stylesheet">

    <style>
        /* ==================================================
           GLOBAL COLOR & ATMOSPHERE SYSTEM
           ================================================== */
        :root {
            /* Warm dark tones replacing pure black */
            --bg-dark: #12100B;
            --bg-mid: #16130D;
            --bg-warm: #1A160F; 
            
            /* Beige/Ivory tones for previews */
            --bg-beige: #C9B993;
            --bg-beige-light: #D1C2A1;
            
            /* Typography Colors */
            --text-ivory: #D8C7AA;
            --text-muted: #BBAE96;
            --accent-gold: #BE8233;
            --text-dark: #12100B; /* For beige sections */
            
            /* Layout */
            --nav-height: 80px;
            --pad-desk: 72px;
            --pad-mob: 32px;
            --max-text: 680px;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html, body {
            width: 100%;
            background-color: var(--bg-dark);
            color: var(--text-ivory);
            font-family: 'Petrona', serif;
            font-weight: 400;
            font-size: 18px;
            line-height: 1.35;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        @media (min-width: 1024px) {
            html, body { font-size: 20px; }
        }

        /* ==================================================
           TYPOGRAPHY (Exact Rules)
           ================================================== */
        h1, h2, h3, h4, .heading-font {
            font-family: 'Marcellus', serif;
            font-weight: 400;
            letter-spacing: 0.02em;
            color: var(--text-ivory);
        }

        /* Enforced sizing for section headings */
        h2, h3 { 
            font-size: 28px; 
            margin-bottom: 1.5rem; 
        }
        
        h3.accent { color: var(--accent-gold); }

        .nav-label, nav a, .back-link {
            font-family: 'Source Sans 3', sans-serif;
            font-size: 22px;
            letter-spacing: 0.12em;
            font-weight: 400;
            text-transform: uppercase;
        }

        p {
            max-width: var(--max-text);
            margin-bottom: 1.5rem;
            color: var(--text-muted);
        }
        p:last-child { margin-bottom: 0; }

        a { color: inherit; text-decoration: none; transition: color 0.4s ease; cursor: pointer; }
        a:hover { color: var(--accent-gold); }

        /* ==================================================
           MULTI-PAGE ROUTING ARCHITECTURE (SPA)
           ================================================== */
        .page-view {
            display: none; opacity: 0; width: 100%; min-height: 100vh;
            animation: atmosphericFadeIn 1s forwards ease-in-out;
        }
        .page-view.active { display: block; }

        @keyframes atmosphericFadeIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
